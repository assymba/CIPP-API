name: Auto-sync with upstream CIPP

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh repo sync ${{ github.repository }} \
            --source KelvinTegelaar/CIPP-API \
            --branch master
